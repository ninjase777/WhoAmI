<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sedra Mahmoud | ITE Student</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=Rajdhani:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    body { font-family: 'Rajdhani', sans-serif; }
    .glow-green { box-shadow: 0 0 15px rgba(0, 255, 136, 0.3), inset 0 0 15px rgba(0, 255, 136, 0.05); }
    .glow-green:hover { box-shadow: 0 0 30px rgba(0, 255, 136, 0.5), inset 0 0 30px rgba(0, 255, 136, 0.1); }
    .glass-btn {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 136, 0.2);
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .glass-btn:hover {
      background: rgba(0, 255, 136, 0.08);
      border-color: rgba(0, 255, 136, 0.6);
      transform: translateY(-3px) scale(1.02);
    }
    .name-text { font-family: 'Orbitron', monospace; }
    .cyber-avatar {
      width: 140px; height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
      border: 2px solid rgba(0, 255, 136, 0.4);
      box-shadow: 0 0 40px rgba(0, 255, 136, 0.2);
      display: flex; align-items: center; justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .cyber-avatar::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent, rgba(0,255,136,0.4), transparent, rgba(0,255,136,0.2), transparent);
      animation: spin 4s linear infinite;
    }
    .cyber-avatar::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0d0d0d, #1a1a2e);
      z-index: 1;
    }
    .avatar-inner { 
      position: relative; 
      z-index: 2; 
      width: 130px; 
      height: 130px; 
      border-radius: 50%; 
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeUp 0.6s ease forwards; opacity: 0; }
    .grid-bg {
      background-image: 
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .scanline {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
      pointer-events: none; z-index: 50;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-[#0a0a0f] text-white overflow-auto">
  <div class="scanline"></div>
  <div class="grid-bg min-h-full w-full flex flex-col items-center justify-start py-12 px-4">
   
   <!-- Avatar Container updated with your custom reference image -->
   <div class="cyber-avatar animate-in" style="animation-delay: 0.1s;">
    <div class="avatar-inner">
     <img src="image_b38883.jpg" alt="Sedra Mahmoud">
    </div>
   </div>

   <!-- Name -->
   <h1 id="profile-name" class="name-text text-2xl md:text-3xl font-bold mt-6 tracking-wider animate-in" style="animation-delay: 0.3s; color: #e0e0e0;">Sedra Mahmoud</h1>
   <p id="profile-subtitle" class="text-sm md:text-base mt-2 tracking-widest uppercase animate-in" style="animation-delay: 0.4s; color: #00ff88; opacity: 0.8;">Information Engineering Student</p>
   
   <!-- Buttons with correct URLs -->
   <div class="w-full max-w-sm mt-10 flex flex-col gap-4">
    <a id="btn-1" href="https://www.instagram.com/sedramahmoud_?igsh=cWhrYWlmZmp4dzd6" target="_blank" rel="noopener noreferrer" class="glass-btn glow-green rounded-xl px-6 py-4 flex items-center gap-3 animate-in" style="animation-delay: 0.5s;"> <i data-lucide="instagram" style="width:20px;height:20px;color:#00ff88;"></i> <span class="text-base font-medium tracking-wide">@sedramahmoud_</span> </a> 
    <a id="btn-2" href="https://www.instagram.com/ninjasedra.cyber?igsh=amNlNTFkYjUwMXhr" target="_blank" rel="noopener noreferrer" class="glass-btn glow-green rounded-xl px-6 py-4 flex items-center gap-3 animate-in" style="animation-delay: 0.6s;"> <i data-lucide="instagram" style="width:20px;height:20px;color:#00ff88;"></i> <span class="text-base font-medium tracking-wide">@ninjasedra.cyber</span> </a> 
    <a id="btn-3" href="https://t.me/ninjasedracyber" target="_blank" rel="noopener noreferrer" class="glass-btn glow-green rounded-xl px-6 py-4 flex items-center gap-3 animate-in" style="animation-delay: 0.7s;"> <i data-lucide="send" style="width:20px;height:20px;color:#00ff88;"></i> <span class="text-base font-medium tracking-wide">@ninjasedracyber</span> </a> 
    <a id="btn-4" href="https://t.me/ninjasedra" target="_blank" rel="noopener noreferrer" class="glass-btn glow-green rounded-xl px-6 py-4 flex items-center gap-3 animate-in" style="animation-delay: 0.8s;"> <i data-lucide="send" style="width:20px;height:20px;color:#00ff88;"></i> <span class="text-base font-medium tracking-wide">@ninjasedra</span> </a> 
    <a id="btn-5" href="https://www.linkedin.com/in/sedra-mahmoud-a12668372" target="_blank" rel="noopener noreferrer" class="glass-btn glow-green rounded-xl px-6 py-4 flex items-center gap-3 animate-in" style="animation-delay: 0.9s;"> <i data-lucide="linkedin" style="width:20px;height:20px;color:#00ff88;"></i> <span class="text-base font-medium tracking-wide">Sedra Mahmoud</span> </a>
   </div>

   <!-- Footer -->
   <p class="mt-12 text-xs opacity-30 tracking-widest uppercase animate-in" style="animation-delay: 1s;">⟨ Keep Going :) ⟩</p>
  </div>

  <script>
    lucide.createIcons();

    const defaultConfig = {
      profile_name: 'Sedra Mahmoud',
      profile_subtitle: 'Information Engineering Student',
      button_1_text: '@sedramahmoud_',
      button_1_url: 'https://www.instagram.com/sedramahmoud_?igsh=cWhrYWlmZmp4dzd6',
      button_2_text: '@ninjasedra.cyber',
      button_2_url: 'https://www.instagram.com/ninjasedra.cyber?igsh=amNlNTFkYjUwMXhr',
      button_3_text: '@ninjasedracyber',
      button_3_url: 'https://t.me/ninjasedracyber',
      button_4_text: '@ninjasedra',
      button_4_url: 'https://t.me/ninjasedra',
      button_5_text: 'Sedra Mahmoud',
      button_5_url: 'https://www.linkedin.com/in/sedra-mahmoud-a12668372',
      background_color: '#0a0a0f',
      accent_color: '#00ff88',
      text_color: '#e0e0e0',
      font_family: 'Rajdhani',
      font_size: 16
    };

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        document.getElementById('profile-name').textContent = config.profile_name || defaultConfig.profile_name;
        document.getElementById('profile-subtitle').textContent = config.profile_subtitle || defaultConfig.profile_subtitle;
        
        const btnTexts = [config.button_1_text, config.button_2_text, config.button_3_text, config.button_4_text, config.button_5_text];
        const btnUrls = [config.button_1_url, config.button_2_url, config.button_3_url, config.button_4_url, config.button_5_url];
        
        for (let i = 0; i < 5; i++) {
          const btn = document.getElementById(`btn-${i+1}`);
          if (btn) {
            btn.querySelector('span').textContent = btnTexts[i] || defaultConfig[`button_${i+1}_text`];
            btn.href = btnUrls[i] || '#';
          }
        }

        const bg = config.background_color || defaultConfig.background_color;
        const accent = config.accent_color || defaultConfig.accent_color;
        const txt = config.text_color || defaultConfig.text_color;
        const font = config.font_family || defaultConfig.font_family;
        const size = config.font_size || defaultConfig.font_size;

        document.body.style.backgroundColor = bg;
        document.getElementById('profile-name').style.color = txt;
        document.getElementById('profile-subtitle').style.color = accent;
        document.body.style.fontFamily = `${font}, Rajdhani, sans-serif`;
        document.body.style.fontSize = `${size}px`;
        document.getElementById('profile-name').style.fontSize = `${size * 1.8}px`;
        document.getElementById('profile-subtitle').style.fontSize = `${size * 0.9}px`;
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['profile_name', config.profile_name || defaultConfig.profile_name],
        ['profile_subtitle', config.profile_subtitle || defaultConfig.profile_subtitle],
        ['button_1_text', config.button_1_text || defaultConfig.button_1_text],
        ['button_1_url', config.button_1_url || defaultConfig.button_1_url],
        ['button_2_text', config.button_2_text || defaultConfig.button_2_text],
        ['button_2_url', config.button_2_url || defaultConfig.button_2_url],
        ['button_3_text', config.button_3_text || defaultConfig.button_3_text],
        ['button_3_url', config.button_3_url || defaultConfig.button_3_url],
        ['button_4_text', config.button_4_text || defaultConfig.button_4_text],
        ['button_4_url', config.button_4_url || defaultConfig.button_4_url],
        ['button_5_text', config.button_5_text || defaultConfig.button_5_text],
        ['button_5_url', config.button_5_url || defaultConfig.button_5_url]
      ])
    });
  </script>
 </body>
</html>
